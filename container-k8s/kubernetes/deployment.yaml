apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app
  namespace: musluck
spec:
  selector:
    matchLabels:
      app: api-app
  template:
    metadata:
      labels:
        app: api-app
    spec:
      serviceAccountName: api-gateway
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api-app
          image: ghcr.io/musluck-com/backend-api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: api-gateway-secret
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources: 
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              
              
